name: Atualiza notícias (RadarPE)

# Roda o backfill de notícias no servidor do GitHub e commita o data.json.
# O script recomputa sempre os últimos 6 meses, então cada execução deixa o
# momentum atualizado em relação à data de hoje.

on:
  schedule:
    - cron: '0 6 * * 1'        # toda segunda, 06:00 UTC (~03:00 BRT)
  workflow_dispatch: {}          # botão "Run workflow" para rodar na hora

permissions:
  contents: write                # necessário para o bot commitar de volta

concurrency:
  group: radarpe-data            # evita que este e o de CNPJ commitem ao mesmo tempo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests anthropic

      - name: Rodar backfill de notícias
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python backfill_news.py

      - name: Commitar data.json (se mudou)
        run: |
          git config user.name  "radarpe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "sem mudanças" && exit 0
          git commit -m "chore: atualiza notícias $(date -u +%F)"
          git pull --rebase origin main
          git push
